<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diara Gems Item</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100vh; background: #f4f7fb; color: #1b1f2a; }
    .page-shell { max-width: 620px; margin: 0 auto; padding: 22px 18px; }
    .card { background: #ffffff; border-radius: 18px; box-shadow: 0 16px 40px rgba(23,33,64,.08); padding: 24px; }
    .title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #5a6374; margin-bottom: 24px; }
    .field-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center; margin-bottom: 16px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-name { color: #6c7586; font-size: 13px; text-transform: uppercase; letter-spacing: .04em; }
    .field-value { font-size: 16px; line-height: 1.5; }
    .badge { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; }
    .badge.active { background: #e8f4ff; color: #1558d6; }
    .badge.inactive { background: #f8ebf1; color: #a61938; }
    .error-card { background: #fff2f2; border: 1px solid #f1c5c8; color: #9f2a36; }
    .link-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: 12px; padding: 12px 16px; cursor: pointer; text-decoration: none; color: #fff; font-weight: 700; }
    .btn-primary { background: #0042d1; }
    .btn-secondary { background: #232f5e; }
    .btn-outline { background: transparent; color: #232f5e; border: 1px solid #d7dce9; }
    .btn-warning { background: #ff8f00; }
    .btn-danger { background: #d92f3d; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
    .small-note { margin-top: 18px; color: #556174; font-size: 13px; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="card" id="item-card">
      <div class="title">Loading item…</div>
      <div class="subtitle">Fetching product information for this QR code link.</div>
      <div id="item-content"></div>
      <div id="item-actions" class="link-row"></div>
    </div>
  </div>

  <script>
    const itemCard = document.getElementById('item-card');
    const itemContent = document.getElementById('item-content');
    const itemActions = document.getElementById('item-actions');
    let currentItem = null;

    function getItemId() {
      const path = window.location.pathname.replace(/\/item\//i, '');
      return decodeURIComponent(path || '');
    }

    function formatDate(value) {
      if (!value) return '—';
      const d = new Date(value);
      return d.toLocaleDateString(undefined, { day: 'numeric', month: 'short', year: 'numeric' });
    }

    async function loadItem() {
      const id = getItemId();
      if (!id) {
        showError('Invalid item link. No product identifier found.');
        return;
      }

      try {
        const res = await fetch('/api/inventory/' + encodeURIComponent(id));
        if (!res.ok) {
          const error = await res.json().catch(() => ({}));
          throw new Error(error.error || 'Item not found');
        }
        currentItem = await res.json();
        renderItem(currentItem);
      } catch (err) {
        showError(err.message || 'Unable to load item.');
      }
    }

    function renderItem(item) {
      itemCard.querySelector('.title').textContent = item.stoneType || item.brand || item.stone || 'Gemstone Item';
      itemCard.querySelector('.subtitle').textContent = 'Product page for QR ID: ' + item.qr;
      currentItem = item;

      itemContent.innerHTML = `
        <div class="field-row"><div class="field-name">QR Code</div><div class="field-value">${item.qr || '—'}</div></div>
        <div class="field-row"><div class="field-name">Stone</div><div class="field-value">${item.stone || item.stoneType || item.brand || '—'}</div></div>
        <div class="field-row"><div class="field-name">Colour</div><div class="field-value">${item.colour || '—'}</div></div>
        <div class="field-row"><div class="field-name">Shape</div><div class="field-value">${item.shape || '—'}</div></div>
        <div class="field-row"><div class="field-name">Size</div><div class="field-value">${item.size || '—'}</div></div>
        <div class="field-row"><div class="field-name">Grade</div><div class="field-value">${item.grade || '—'}</div></div>
        <div class="field-row"><div class="field-name">Quantity</div><div class="field-value">${item.qty ?? '—'} pcs</div></div>
        <div class="field-row"><div class="field-name">Purchase Price</div><div class="field-value">₹ ${item.pp ?? '—'}</div></div>
        <div class="field-row"><div class="field-name">Sale Price</div><div class="field-value">₹ ${item.sp ?? '—'}</div></div>
        <div class="field-row"><div class="field-name">Status</div><div class="field-value"><span class="badge ${item.active === false ? 'inactive' : 'active'}">${item.active === false ? 'Inactive' : 'Active'}</span></div></div>
        <div class="field-row"><div class="field-name">Added</div><div class="field-value">${formatDate(item.createdAt)}</div></div>
      `;

      itemActions.innerHTML = `
        <div class="btn-group">
          <button class="btn btn-warning" onclick="adjustQuantity('in')">Inward</button>
          <button class="btn btn-danger" onclick="adjustQuantity('out')">Outward</button>
          <button class="btn btn-secondary" onclick="editItem()">Edit</button>
          <button class="btn btn-outline" onclick="deleteItem()">Delete</button>
        </div>
        <div class="btn-group">
          <a class="btn btn-primary" href="/stock.html">Open Stock Manager</a>
          <a class="btn btn-secondary" href="/admin.html">Go to Admin</a>
        </div>
      `;
    }

    function showError(message) {
      itemCard.querySelector('.title').textContent = 'Item not available';
      itemCard.querySelector('.subtitle').textContent = 'This QR link is not valid on this server.';
      itemContent.innerHTML = `<div class="error-card" style="padding:18px;border-radius:14px;">${message}</div>`;
      itemActions.innerHTML = `<a class="btn btn-outline" href="/stock.html">Back to Stock Manager</a>`;
    }

    async function adjustQuantity(type) {
      if (!currentItem) return;
      const label = type === 'in' ? 'Add quantity' : 'Remove quantity';
      const input = prompt(`${label} for ${currentItem.qr} (${currentItem.shape} ${currentItem.size}):`, '1');
      if (input === null) return;
      const qtyChange = Number(input);
      if (!qtyChange || qtyChange <= 0) {
        alert('Enter a valid quantity greater than zero.');
        return;
      }

      const targetQty = type === 'in' ? currentItem.qty + qtyChange : currentItem.qty - qtyChange;
      if (targetQty < 0) {
        alert('Quantity cannot be negative.');
        return;
      }

      try {
        const res = await fetch(`/api/inventory/${encodeURIComponent(currentItem._id)}/qty`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ qty: targetQty }),
        });
        if (!res.ok) throw new Error('Failed to update stock');
        const updated = await res.json();
        renderItem(updated);
        alert(`Stock ${type === 'in' ? 'added' : 'removed'} successfully.`);
      } catch (err) {
        alert(err.message || 'Unable to update quantity.');
      }
    }

    async function editItem() {
      if (!currentItem) return;
      const newPP = prompt('Purchase price', currentItem.pp || 0);
      if (newPP === null) return;
      const newSP = prompt('Sale price', currentItem.sp || 0);
      if (newSP === null) return;
      const active = confirm('Keep this item active? Click OK for Active, Cancel for Inactive.');

      try {
        const res = await fetch(`/api/inventory/${encodeURIComponent(currentItem._id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ pp: Number(newPP), sp: Number(newSP), active }),
        });
        if (!res.ok) throw new Error('Failed to save item');
        const updated = await res.json();
        renderItem(updated);
        alert('Item updated successfully.');
      } catch (err) {
        alert(err.message || 'Unable to update item.');
      }
    }

    async function deleteItem() {
      if (!currentItem) return;
      const confirmed = confirm(`Delete ${currentItem.qr} from stock? This cannot be undone.`);
      if (!confirmed) return;

      try {
        const res = await fetch(`/api/inventory/${encodeURIComponent(currentItem._id)}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');
        alert('Item deleted successfully. Redirecting to stock manager.');
        window.location.href = '/stock.html';
      } catch (err) {
        alert(err.message || 'Unable to delete item.');
      }
    }

    loadItem();
  </script>
</body>
</html>
